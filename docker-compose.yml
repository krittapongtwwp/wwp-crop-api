services:
  postgres:
    image: postgres:15-alpine
    container_name: wwp-postgres
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres_password}
      - POSTGRES_DB=${DB_NAME:-wwp_cms}
    ports:
      - '5432:5432'
    volumes: [postgres_data:/var/lib/postgresql/data]

  postgres-legacy:
    image: postgres:15-alpine
    container_name: wwp-postgres-legacy
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres_password}
      - POSTGRES_DB=${DB_NAME:-wwp_legacy}
    ports:
      - '5432:5432'
    volumes: [postgres_legacy_data:/var/lib/postgresql/data]

volumes:
  postgres_data:
  postgres_legacy_data:
